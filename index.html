<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builder Roadmap — Web + AI + ML</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1b2a;--bg2:#112240;--bg3:#1a2d4a;--text:#E0E6F0;--text2:#8899B0;--text3:#5A6A80;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--font:'DM Sans',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1440px;margin:0 auto;padding:14px 18px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;gap:10px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.5px}
.logo span{opacity:.3;font-weight:400;margin:0 6px}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-family:var(--font);font-size:11px;font-weight:500;padding:5px 12px;border-radius:18px;border:1px solid var(--border2);background:rgba(255,255,255,.04);color:var(--text2);cursor:pointer;transition:all .15s}
.pill:hover{border-color:rgba(255,255,255,.3);color:var(--text)}
.pill.on{background:rgba(255,255,255,.08);color:var(--text);border-color:rgba(255,255,255,.3)}
.pill.pw.on{background:rgba(127,119,221,.15);color:#CECBF6;border-color:rgba(127,119,221,.4)}
.pill.pa.on{background:rgba(239,159,39,.15);color:#FAC775;border-color:rgba(239,159,39,.4)}
.pill.pm.on{background:rgba(212,83,126,.15);color:#F4C0D1;border-color:rgba(212,83,126,.4)}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.st{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 12px}
.st-l{font-size:8px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.st-v{font-size:16px;font-weight:700;margin-top:1px}
.main{display:grid;grid-template-columns:1fr 360px;gap:14px}
@media(max-width:900px){.main{grid-template-columns:1fr}.side{max-height:50vh}}
.graph-box{background:var(--bg2);border-radius:12px;border:1px solid var(--border);overflow:hidden;min-height:620px;position:relative}
.graph-box svg{width:100%;height:100%}
.gl{position:absolute;top:10px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;pointer-events:none;z-index:2}
.gl-w{left:12px;background:rgba(127,119,221,.15);color:#CECBF6}
.gl-a{left:50%;transform:translateX(-50%);background:rgba(239,159,39,.15);color:#FAC775}
.gl-m{right:12px;background:rgba(212,83,126,.15);color:#F4C0D1}
.side{display:flex;flex-direction:column}
.ph{display:flex;align-items:center;justify-content:center;height:100%;min-height:300px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);color:var(--text3);font-size:12px;text-align:center;padding:20px}
.det{background:var(--bg2);border-radius:12px;border:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 100px);display:none}
.det.open{display:block}
.dh{padding:12px 16px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;display:flex;justify-content:space-between;align-items:flex-start}
.dh-left{flex:1}
.badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:5px}
.dtitle{font-size:16px;font-weight:700;letter-spacing:-.3px}
.dphase{font-size:10px;color:var(--text3);margin-top:2px}
.dcl{font-family:var(--font);font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0}
.dcl:hover{background:rgba(255,255,255,.05)}
.ds{padding:10px 16px;border-top:1px solid var(--border)}
.dl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:5px}
.dprow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dpbar{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.dpfill{height:100%;border-radius:2px;transition:width .3s}
.dppct{font-size:10px;font-weight:600;min-width:28px;text-align:right}
.sbs{display:flex;gap:4px}
.sb{font-family:var(--font);font-size:9px;font-weight:500;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .12s}
.sb:hover{border-color:rgba(255,255,255,.25)}
.sb.on.s0{background:rgba(255,255,255,.06);color:var(--text2)}
.sb.on.s1{background:rgba(186,117,23,.25);color:#FAC775;border-color:rgba(186,117,23,.4)}
.sb.on.s2{background:rgba(29,158,117,.25);color:#5DCAA5;border-color:rgba(29,158,117,.4)}
.chk{display:flex;align-items:flex-start;gap:6px;padding:2px 0;font-size:11px;color:var(--text);cursor:pointer;line-height:1.4}
.chk input{margin-top:2px;accent-color:#1D9E75;cursor:pointer}
.chk.done{color:var(--text3);text-decoration:line-through}
.obox{font-size:11px;color:var(--text);line-height:1.5;background:rgba(255,255,255,.03);border-radius:6px;padding:7px 10px;border:1px solid var(--border)}
.deps{display:flex;flex-wrap:wrap;gap:3px}
.dep{font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;cursor:pointer}
.dep:hover{opacity:.8}
.ri{padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.ri:last-child{border:none}
.ri-left{flex:1;min-width:0}
.rt{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:1px 4px;border-radius:3px;margin-right:4px;vertical-align:middle}
.rt-video{background:rgba(224,75,75,.15);color:#F09595}
.rt-docs{background:rgba(55,138,221,.15);color:#85B7EB}
.rt-course{background:rgba(29,158,117,.15);color:#5DCAA5}
.rt-tool{background:rgba(186,117,23,.15);color:#FAC775}
.rt-practice{background:rgba(127,119,221,.15);color:#AFA9EC}
.rn{font-size:11px;font-weight:500;color:var(--text)}
.rd{font-size:9px;color:var(--text3);margin-top:1px}
.ri-del{font-family:var(--font);font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid rgba(224,75,75,.2);background:transparent;color:#F09595;cursor:pointer;flex-shrink:0;opacity:.5;transition:opacity .15s}
.ri-del:hover{opacity:1;background:rgba(224,75,75,.1)}
.add-res{margin-top:8px}
.add-res-btn{font-family:var(--font);font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;width:100%;transition:all .12s}
.add-res-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.add-form{margin-top:8px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;padding:8px}
.add-form input,.add-form select{font-family:var(--font);font-size:11px;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:4px;padding:4px 8px;width:100%;margin-bottom:5px;outline:none}
.add-form select{cursor:pointer}
.add-form input:focus{border-color:rgba(239,159,39,.4)}
.af-btns{display:flex;gap:4px;margin-top:4px}
.af-btns button{font-family:var(--font);font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.af-btns button:first-child{background:rgba(29,158,117,.15);color:#5DCAA5;border-color:rgba(29,158,117,.3)}
.notes textarea{width:100%;min-height:60px;font-family:var(--font);font-size:11px;color:var(--text);background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:6px;padding:7px 9px;resize:vertical;line-height:1.4;outline:none}
.notes textarea:focus{border-color:rgba(239,159,39,.4)}
.nsv{font-size:9px;color:#1D9E75;margin-top:2px;opacity:0;transition:opacity .3s}
.nsv.show{opacity:1}
</style>
</head>

var ld=allE.map(function(e){return{source:e.s,target:e.t,cross:e.s[0]!==e.t[0]||(e.s[0]===e.t[0]&&e.s[1]!==e.t[1])}});
var sim=d3.forceSimulation(allN)
.force('link',d3.forceLink(ld).id(function(d){return d.id}).distance(function(d){return d.cross?100:48}).strength(function(d){return d.cross?0.04:0.45}))
.force('charge',d3.forceManyBody().strength(-200))
.force('x',d3.forceX(function(d){return d.g==='web'?BW*0.18:d.g==='ai'?BW*0.5:BW*0.82}).strength(0.18))
.force('y',d3.forceY(function(d){return 40+d.p*(BH-80)/3}).strength(0.25))
.force('collide',d3.forceCollide(24));
var lG=svg.append('g'),nG=svg.append('g');
var links=lG.selectAll('path').data(ld).join('path').attr('fill','none')
.attr('stroke',function(d){if(d.cross)return'#3A4A60';var sn=allN.find(function(n){return n.id===(typeof d.source==='object'?d.source.id:d.source)});return sn?gPC(sn):'#555'})
.attr('stroke-width',function(d){return d.cross?.7:1.1})
.attr('stroke-opacity',function(d){return d.cross?.15:.35})
.attr('stroke-dasharray',function(d){return d.cross?'3 2':'none'})
.attr('marker-end','url(#ah)');
var gN=nG.selectAll('g').data(allN).join('g').style('cursor','grab')
.call(d3.drag().on('start',function(ev,d){if(!ev.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',function(ev,d){d.fx=ev.x;d.fy=ev.y}).on('end',function(ev,d){if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
.on('click',function(ev,d){ev.stopPropagation();openDet(d)});
gN.append('circle').attr('class','sr').attr('r',R+3).attr('fill','none').attr('stroke','transparent').attr('stroke-width',2);
gN.append('circle').attr('r',R).attr('fill',function(d){return gPF(d)}).attr('stroke',function(d){return gPS(d)}).attr('stroke-width',1.1);
gN.append('text').text(function(d){var pre=d.g==='web'?'W':d.g==='ai'?'A':'M';return pre+d.id.slice(1)}).attr('text-anchor','middle').attr('dominant-baseline','central').attr('font-family','DM Sans').attr('font-size','8px').attr('font-weight',700).attr('fill',function(d){return gPC(d)});
gN.append('text').text(function(d){return d.label}).attr('text-anchor','middle').attr('dy',R+10).attr('font-family','DM Sans').attr('font-size','8px').attr('fill','rgba(224,230,240,.55)');
function cp(d){var sx=d.source.x,sy=d.source.y,tx=d.target.x,ty=d.target.y,dx=tx-sx,dy=ty-sy,dr=Math.sqrt(dx*dx+dy*dy)||1,ox=dx/dr*R,oy=dy/dr*R,x1=sx+ox,y1=sy+oy,x2=tx-ox,y2=ty-oy,mx=(x1+x2)/2,my=(y1+y2)/2,nx=-(y2-y1),ny=x2-x1,nL=Math.sqrt(nx*nx+ny*ny)||1,c=Math.min(dr*.1,14);return'M'+x1+','+y1+' Q'+(mx+nx/nL*c)+','+(my+ny/nL*c)+' '+x2+','+y2}
sim.on('tick',function(){allN.forEach(function(d){d.x=Math.max(R+4,Math.min(BW-R-4,d.x));d.y=Math.max(R+4,Math.min(BH-R-16,d.y))});links.attr('d',cp);gN.attr('transform',function(d){return'translate('+d.x+','+d.y+')'})});
return{svg:svg,sim:sim,links:links,gN:gN,ld:ld}
}

function addRes(id){
var t=document.getElementById('af-type').value;
var n=document.getElementById('af-name').value.trim();
var d=document.getElementById('af-desc').value.trim();
if(!n)return;
var res=nodeRes(allN.find(function(x){return x.id===id}));
var nr=[...res,{t:t,n:n,d:d}];
setRes(id,nr);
var nd=allN.find(function(x){return x.id===id});
if(nd)openDet(nd);
}

function delRes(id,idx){
var nd=allN.find(function(x){return x.id===id});
var res=[...nodeRes(nd)];
res.splice(idx,1);
setRes(id,res);
if(nd)openDet(nd);
}
